{% extends "base.html" %}
{% block title %}Menu - The Brew-Time{% endblock %}
{% block content %}
<h1 class="mb-4">📋 Our Menu</h1>
<div class="row">
    {% for product in products %}
    <div class="col-md-4 mb-3">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ product.name }}</h5>
                <p class="card-text">{{ product.description }}</p>
                <p class="card-text"><strong>{{ product.price }} EGP</strong></p>
                <button class="btn btn-primary add-to-cart"
                        data-id="{{ product.id }}"
                        data-name="{{ product.name }}"
                        data-price="{{ product.price }}">Add to Cart</button>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<hr>

<div class="row">
    <div class="col-md-6">
        <h3>🛒 Your Cart</h3>
        <div id="cart-container">
            <p class="text-muted">Cart is empty.</p>
        </div>
        <button id="checkout-btn" class="btn btn-success mt-3" disabled>Place Order</button>
        <p id="order-feedback" class="mt-2"></p>
    </div>
</div>

<script>
    const cart = [];

    // Update cart display
    function renderCart() {
        const container = document.getElementById('cart-container');
        if (cart.length === 0) {
            container.innerHTML = '<p class="text-muted">Cart is empty.</p>';
            document.getElementById('checkout-btn').disabled = true;
        } else {
            let html = '';
            cart.forEach((item, idx) => {
                html += `<div class="cart-item d-flex justify-content-between">
                    <span>${item.name} x${item.qty}</span>
                    <span>${(item.price * item.qty).toFixed(2)} EGP
                        <button class="btn btn-sm btn-danger ms-2 remove-item" data-index="${idx}">✕</button>
                    </span>
                </div>`;
            });
            container.innerHTML = html;
            document.getElementById('checkout-btn').disabled = false;
        }
    }

    // Add to cart
    document.querySelectorAll('.add-to-cart').forEach(btn => {
        btn.addEventListener('click', function() {
            const id = parseInt(this.dataset.id);
            const name = this.dataset.name;
            const price = parseFloat(this.dataset.price);
            const existing = cart.find(item => item.product_id === id);
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ product_id: id, name: name, price: price, qty: 1 });
            }
            renderCart();
        });
    });

    // Remove from cart (delegated event)
    document.getElementById('cart-container').addEventListener('click', function(e) {
        if (e.target.classList.contains('remove-item')) {
            const idx = parseInt(e.target.dataset.index);
            cart.splice(idx, 1);
            renderCart();
        }
    });

    // Checkout
    document.getElementById('checkout-btn').addEventListener('click', async () => {
        const payload = { items: cart.map(item => ({ product_id: item.product_id, quantity: item.qty })) };
        try {
            const res = await fetch('/place_order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if (res.ok) {
                document.getElementById('order-feedback').innerHTML =
                    `<div class="alert alert-success">Order placed! Your Order ID is <strong>${result.order_id}</strong>
                    <br><a href="/track?order_id=${result.order_id}">Track your order</a></div>`;
                cart.length = 0;  // clear cart
                renderCart();
            } else {
                alert('Error: ' + result.error);
            }
        } catch (err) {
            alert('Network error. Please try again.');
        }
    });
</script>
{% endblock %}
