{% extends "base.html" %}
{% block title %}Track Order - The Brew-Time{% endblock %}
{% block content %}
<h1>🔍 Track Your Order</h1>
<div class="row">
    <div class="col-md-6">
        <div class="mb-3">
            <label for="order-id-input" class="form-label">Enter your Order ID</label>
            <input type="number" id="order-id-input" class="form-control" placeholder="e.g., 123" min="1">
            <button id="track-btn" class="btn btn-primary mt-2">Track</button>
        </div>
        <div id="track-result" class="mt-3">
            <!-- Status display will appear here -->
        </div>
    </div>
</div>

<script>
    document.getElementById('track-btn').addEventListener('click', async () => {
        const orderId = document.getElementById('order-id-input').value.trim();
        if (!orderId) return;
        const res = await fetch('/status/' + orderId);
        if (!res.ok) {
            document.getElementById('track-result').innerHTML = '<div class="alert alert-danger">Order not found.</div>';
            return;
        }
        const order = await res.json();

        const statusColors = {
            'Pending': 'secondary',
            'Preparing': 'warning',
            'Ready': 'success',
            'Completed': 'info'
        };
        const color = statusColors[order.status] || 'dark';
        let itemsHtml = '';
        order.items.forEach(i => itemsHtml += `<li>${i.name} x${i.qty}</li>`);

        document.getElementById('track-result').innerHTML = `
            <div class="card">
                <div class="card-body">
                    <h5>Order #${order.order_id}</h5>
                    <p>Status: <span class="badge bg-${color} status-badge">${order.status}</span></p>
                    <p>Total: <strong>${order.total.toFixed(2)} EGP</strong></p>
                    <ul>${itemsHtml}</ul>
                </div>
            </div>`;
    });

    // Auto-fill if order_id passed in URL
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('order_id')) {
        document.getElementById('order-id-input').value = urlParams.get('order_id');
    }
</script>
{% endblock %}
